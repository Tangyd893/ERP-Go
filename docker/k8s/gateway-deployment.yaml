apiVersion: v1
kind: Namespace
metadata:
  name: erp-go

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: erp-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: api-gateway
      containers:
        - name: api-gateway
          image: erp-go/gateway:v0.9.0
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: "production"
            # 集群内 Service 间 HTTP 明文通信 — 见 docs/adr/007-internal-service-http.md
            # SonarCloud kubernetes:S5332 已审查为 Safe（内网不可路由）
            - name: SERVICE_TARGET_IAM
              value: "http://iam-service.erp-go.svc.cluster.local:8081"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: erp-go
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
