version: "3.9"

# ============================================================
# ERP-Go 本地开发中间件编排
# ============================================================

services:
  # ============================================================
  # PostgreSQL - 业务数据库
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp123}
      POSTGRES_DB: ${POSTGRES_DB:-erp_go}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp} -d ${POSTGRES_DB:-erp_go}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - erp-network

  # ============================================================
  # Redis - 缓存和分布式锁
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # ============================================================
  # RabbitMQ - 消息队列
  # ============================================================
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: erp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # ============================================================
  # MinIO - 对象存储
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: erp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # ============================================================
  # MinIO 初始化（创建默认 bucket）
  # ============================================================
  minio-init:
    image: minio/mc:latest
    container_name: erp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb local/${MINIO_BUCKET:-erp-go} --ignore-existing;
      mc anonymous set public local/${MINIO_BUCKET:-erp-go};
      echo 'MinIO bucket 初始化完成';
      exit 0;
      "
    networks:
      - erp-network

  # ============================================================
  # OpenSearch - 搜索引擎
  # ============================================================
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: erp-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD:-admin123}
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q green || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - erp-network

  # ============================================================
  # Prometheus - 指标采集
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: erp-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - erp-network

  # ============================================================
  # Grafana - 指标看板
  # ============================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: erp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - erp-network

  # ============================================================
  # Loki - 日志聚合
  # ============================================================
  loki:
    image: grafana/loki:3.0.0
    container_name: erp-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - erp-network

  # ============================================================
  # Jaeger - 链路追踪
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: erp-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_PORT:-16686}:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - erp-network

# ============================================================
# 网络
# ============================================================
networks:
  erp-network:
    name: erp-network
    driver: bridge

# ============================================================
# 数据卷
# ============================================================
volumes:
  postgres_data:
    name: erp-postgres-data
  redis_data:
    name: erp-redis-data
  rabbitmq_data:
    name: erp-rabbitmq-data
  minio_data:
    name: erp-minio-data
  opensearch_data:
    name: erp-opensearch-data
  prometheus_data:
    name: erp-prometheus-data
  grafana_data:
    name: erp-grafana-data
  loki_data:
    name: erp-loki-data
