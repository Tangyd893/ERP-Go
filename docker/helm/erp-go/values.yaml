global:
  imageRegistry: ""
  imagePullSecrets: []
  environment: production

gateway:
  enabled: true
  replicas: 2
  image: erp-go/gateway:latest
  port: 8080
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "256Mi" }
  serviceAccount: api-gateway

# 各业务服务默认配置（可单独覆盖）
services:
  iam:        { enabled: true, replicas: 1, port: 8081 }
  tenant:     { enabled: true, replicas: 1, port: 8082 }
  product:    { enabled: true, replicas: 1, port: 8083 }
  channel:    { enabled: true, replicas: 1, port: 8084 }
  order:      { enabled: true, replicas: 2, port: 8085 }
  inventory:  { enabled: true, replicas: 2, port: 8086 }
  warehouse:  { enabled: true, replicas: 1, port: 8087 }
  transport:  { enabled: true, replicas: 1, port: 8088 }
  file:       { enabled: true, replicas: 1, port: 8089 }
  purchase:   { enabled: true, replicas: 1, port: 8091 }
  finance:    { enabled: true, replicas: 1, port: 8092 }
  report:     { enabled: true, replicas: 1, port: 8093 }
  notification: { enabled: true, replicas: 1, port: 8094 }

# Secret 注入（ExternalSecret 或手动创建）
secrets:
  jwt:
    secretKeyRef: { name: erp-go-secrets, key: jwt-secret }
  database:
    urlKeyRef: { name: erp-go-secrets, key: database-url }
  rabbitmq:
    urlKeyRef: { name: erp-go-secrets, key: rabbitmq-url }
