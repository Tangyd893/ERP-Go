name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify (Go + frontend)
        run: bash scripts/verify.sh

      - name: Go test with coverage
        run: |
          go test -C backend ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@689fb39b34b9aa95ebc5f8f119343ddd51542402
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Tangyd893_ERP-Go
            -Dsonar.organization=tangyd893
            -Dsonar.exclusions=**/node_modules/**,**/.cache/**,**/migrations/**,backend/scripts/genhash/**,docs/archive/**
            -Dsonar.issue.ignore.multicriteria=e1,e2
            -Dsonar.issue.ignore.multicriteria.e1.ruleKey=secrets:S8215
            -Dsonar.issue.ignore.multicriteria.e1.resourceKey=**/migrations/**
            -Dsonar.issue.ignore.multicriteria.e2.ruleKey=go:S2068
            -Dsonar.issue.ignore.multicriteria.e2.resourceKey=**/genhash/**

      - name: Review accepted security hotspots
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: bash scripts/sonar-review-hotspots.sh
